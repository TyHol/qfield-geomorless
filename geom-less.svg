<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Horizontal lines suggesting an attribute table / form -->
  <path d="M2 6h20M2 10h20M2 14h20M2 18h20" stroke="#80cc28" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <!-- Dashed circle = no fixed geometry -->
  <circle cx="12" cy="12" r="9.5" stroke="#80cc28" stroke-width="1.6" stroke-dasharray="3.5 2" fill="none"/>
  <!-- Plus = add -->
  <path d="M12 7v10M7 12h10" stroke="#80cc28" stroke-width="2.2" stroke-linecap="round"/>
</svg>
